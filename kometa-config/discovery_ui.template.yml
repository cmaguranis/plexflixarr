# Kometa collection and overlay definitions for the discovery libraries.
#
# !! DO NOT EDIT discovery_ui.yml DIRECTLY !!
# Edit this template instead. The ingestion service regenerates discovery_ui.yml
# on every run by rendering this file with the current Couchmoney themed lists.
#
# The Python ingestion script creates dummy media files and applies Plex labels
# (e.g. Discover_Netflix, Discover_Recs). Kometa reads those labels here and
# builds Smart Collections pinned to the Plex home screen.
#
# No add_missing flags are used. Kometa's job is purely visual — it does not
# trigger any downloads. All library population is handled by the ingest script.

templates:
  discovery_row:
    # Smart Collection scoped to a single Plex label applied by the ingest script.
    # unplayed: true hides items the user has already watched — secondary failsafe
    # on top of the MDBList quality gate in the ingestion pipeline.
    smart_filter:
      all:
        label: <<label_name>>
        unplayed: true
    sort_title: <<sort_prefix>>_<<collection_name>>
    sync_mode: sync
    # Pins this collection as a horizontal row on the Plex home screen.
    visible_home: true
    limit: 20

collections:
  # ── Personalised rows ─────────────────────────────────────────────────────
  Coming Soon (Requested):
    template: {name: discovery_row, label_name: Coming_Soon, sort_prefix: 00}
    summary: Media currently queued in Radarr and Sonarr awaiting release or download.

  Recommended for Me:
    template: {name: discovery_row, label_name: Discover_Recs, sort_prefix: 01}
    summary: Personalised Couchmoney recommendations based on your watch history.

  Recommended Anime:
    template: {name: discovery_row, label_name: Discover_Anime, sort_prefix: 02}
    summary: Personalised anime recommendations from AniList based on your watch history.

  # ── Trending ──────────────────────────────────────────────────────────────
  Trending This Week:
    template: {name: discovery_row, label_name: Discover_Trending, sort_prefix: 03}
    summary: Globally trending movies and TV shows this week.

  # ── Streaming providers ───────────────────────────────────────────────────
  Trending on Netflix:
    template: {name: discovery_row, label_name: Discover_Netflix, sort_prefix: 10}

  Trending on Apple TV+:
    template: {name: discovery_row, label_name: Discover_AppleTV, sort_prefix: 11}

  Trending on Max:
    template: {name: discovery_row, label_name: Discover_Max, sort_prefix: 12}

  Trending on Hulu:
    template: {name: discovery_row, label_name: Discover_Hulu, sort_prefix: 13}

  Trending on AMC:
    template: {name: discovery_row, label_name: Discover_AMC, sort_prefix: 14}

  Trending on Crunchyroll:
    template: {name: discovery_row, label_name: Discover_Crunchyroll, sort_prefix: 15}

  Trending on Disney+:
    template: {name: discovery_row, label_name: Discover_Disney, sort_prefix: 16}

  Trending on Adult Swim:
    template: {name: discovery_row, label_name: Discover_AdultSwim, sort_prefix: 17}

  # ── By genre ──────────────────────────────────────────────────────────────
  Popular Action:
    template: {name: discovery_row, label_name: Discover_Action, sort_prefix: 20}

  Popular Comedy:
    template: {name: discovery_row, label_name: Discover_Comedy, sort_prefix: 21}

  Popular Drama:
    template: {name: discovery_row, label_name: Discover_Drama, sort_prefix: 22}

  Popular Horror:
    template: {name: discovery_row, label_name: Discover_Horror, sort_prefix: 23}

  Popular Sci-Fi:
    template: {name: discovery_row, label_name: Discover_SciFi, sort_prefix: 24}

  Popular Romance:
    template: {name: discovery_row, label_name: Discover_Romance, sort_prefix: 25}

  Popular Animation:
    template: {name: discovery_row, label_name: Discover_Animation, sort_prefix: 26}

  Popular Documentary:
    template: {name: discovery_row, label_name: Discover_Documentary, sort_prefix: 27}

  # ── Couchmoney themed collections (dynamically generated) ─────────────────
  # Populated by the ingestion service from TRAKT_USERNAME's Couchmoney lists.
  # Sort prefixes 30+ are reserved for these dynamic rows.
{% for col in couchmoney_collections %}
  "{{ col.display_name }}":
    template: {name: discovery_row, label_name: {{ col.label }}, sort_prefix: {{ col.sort_prefix }}}
{% endfor %}

overlays:
  # ── "Request Needed" text badge (top of poster) ───────────────────────────
  # Applied to every dummy file so it's visually distinct from real media.
  # No PNG required — uses Kometa's built-in text + backdrop overlay.

  Request Needed Backdrop:
    overlay:
      name: backdrop
      back_color: "#00000099"
      back_height: 60
      vertical_align: top
    plex_search:
      any:
        label.beginsWith: Discover_

  Request Needed Text:
    overlay:
      name: text(Request)
      horizontal_offset: 0
      horizontal_align: center
      vertical_offset: 18
      vertical_align: top
      font_size: 35
      font_color: "#FFFFFF"
    plex_search:
      any:
        label.beginsWith: Discover_

  # ── Streaming service logo overlays (bottom-left) ────────────────────────────
  # Applied locally from Plex labels — no TMDB/TVDb API calls required.
  # Kometa fetches logo PNGs from its own GitHub repo via the path-based name.

  Streaming Netflix:
    overlay:
      name: streaming/color/Netflix
      horizontal_align: left
      horizontal_offset: 15
      vertical_align: bottom
      vertical_offset: 15
    plex_search:
      all:
        label: Discover_Netflix

  Streaming Apple TV+:
    overlay:
      name: streaming/color/Apple TV Plus
      horizontal_align: left
      horizontal_offset: 15
      vertical_align: bottom
      vertical_offset: 15
