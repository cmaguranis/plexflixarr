# Kometa main configuration.
# This file connects Kometa to Plex and points each discovery library
# at the collection/overlay definitions in discovery_ui.yml.
# No Trakt, MDBList, or Radarr/Sonarr keys are needed here — the Python
# ingestion script handles all data fetching and dummy file management.
libraries:
  Discover Movies:
    collection_files:
      - file: config/discovery_ui.yml
    overlay_files:
      - default: streaming
  Discover Shows:
    collection_files:
      - file: config/discovery_ui.yml
    overlay_files:
      - default: streaming

settings:
  cache: true
  cache_expiration: 6
  # Kometa resolves overlay PNGs relative to this directory.
  # Place request_needed_icon.png at kometa-config/assets/overlays/
  asset_directory: config/assets
  sync_mode: sync
  verify_ssl: true

plex:
  url: http://192.168.1.67:32400
  token: YOUR_PLEX_TOKEN
  timeout: 60

tmdb:
  apikey: YOUR_TMDB_API_KEY
  language: en
